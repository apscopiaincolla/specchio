<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Specchio Greco</title>
    <style>
        body { 
            margin: 0; 
            background: #f4e4bc; 
            color: #333; 
            font-family: 'Georgia', serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            text-align: center;
            /* Modifica qui: ho cambiato 20px in 5px per ridurre lo spazio in alto */
            padding: 3px 20px 20px 20px;
        }
        h1 { font-size: 2.8rem; text-transform: uppercase; margin-bottom: 20px; }
        .immagine-centrale { width: 150px; margin-bottom: 20px; }
        video { 
            width: 90%; max-width: 300px; height: auto; 
            border-radius: 20px; transform: scaleX(-1); 
            border: 8px solid #5a4a30; background: black;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .footer { margin-top: 30px; font-size: 1.3rem; font-weight: bold; }
    </style>
</head>
<body>

    <img src="LOGO.png" class="immagine-centrale" alt="LOGO_CI">

    <h1>SEI PROPRIO TU!</h1>
    
    <video id="webcam" autoplay playsinline></video>

    <div class="footer">Buona visione</div>

    <script>
        const video = document.getElementById('webcam');
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { alert("Per favore, consenti l'accesso alla fotocamera!"); });
    </script>
</body>
</html>
