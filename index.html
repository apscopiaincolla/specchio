<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Specchio Digitale</title>
    <style>
        body { 
            margin: 0; background: #f4e4bc; color: #333; font-family: 'Georgia', serif; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; min-height: 100vh; text-align: center;
        }
        .container { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 20px 0; }
        video { 
            width: 200px; height: 200px; border-radius: 15px; 
            transform: scaleX(-1); border: 5px solid #333; background: black;
        }
        .immagine-maschere { width: 100px; } /* Regola la grandezza qui */
    </style>
</head>
<body>

    <h1>Come fecero i greci</h1>
    
    <div class="container">
        <video id="webcam" autoplay playsinline></video>
        <img src="LOGO.png" class="immagine-maschere" alt="Maschere greche">
    </div>

    <h2>Sei proprio tu!</h2>

    <script>
        const video = document.getElementById('webcam');
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { alert("Attiva la fotocamera!"); });
    </script>
</body>
</html>
